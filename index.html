<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0f172a; color: #fff; }
        
        /* የሚሽከረከር የርዕስ ክፍል */
        .marquee { background: #fbbf24; color: #000; padding: 15px; font-weight: bold; overflow: hidden; white-space: nowrap; }
        .marquee marquee { font-size: 1.5rem; text-transform: uppercase; }

        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        .cta-container { margin-top: 30px; }
        .btn { padding: 15px 30px; margin: 10px; text-decoration: none; border-radius: 50px; font-weight: bold; color: white; display: inline-block; }
        .btn-emp { background: #3b82f6; }
        .btn-job { background: #10b981; }
    </style>
</head>
<body>

<div class="marquee">
    <marquee behavior="scroll" direction="left">✨ BIG MAN AGENCY - ለኢንተርናሽናል ሆቴሎች የላቀ የሰው ኃይል አቅራቢ - YOUR SUCCESS IS OUR GOAL ✨</marquee>
</div>

<div class="hero">
    <h1>BIG MAN</h1>
    <p>የዓለም አቀፍ ሆቴሎች መዳረሻ</p>
    
    <div class="cta-container">
        <a href="employee.html" class="btn btn-job">እኔ ስራ ፈላጊ ነኝ</a>
        <a href="employer.html" class="btn btn-emp">እኔ አሰሪ ነኝ</a>
    </div>
</div>

</body>
</html>
