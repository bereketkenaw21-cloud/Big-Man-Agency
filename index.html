<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        
        /* ዋናው ባክግራውንድ ምስል */
        .hero-bg { 
            height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; 
            background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        /* የሚሽከረከር የBIG MAN ስም */
        .marquee-container { width: 100%; background: #fbbf24; padding: 10px 0; color: #000; font-weight: bold; font-size: 1.5rem; position: absolute; top: 0; overflow: hidden; }
        
        .content { color: white; }
        .btn { padding: 15px 30px; margin: 10px; text-decoration: none; border-radius: 50px; font-weight: bold; color: white; display: inline-block; }
        .btn-emp { background: #3b82f6; }
        .btn-job { background: #10b981; }
    </style>
</head>
<body>

<div class="marquee-container">
    <marquee behavior="scroll" direction="left">✨ BIG MAN AGENCY - YOUR GLOBAL PARTNER FOR HOSPITALITY ✨</marquee>
</div>

<div class="hero-bg">
    <div class="content">
        <h1>BIG MAN</h1>
        <p>የዓለም አቀፍ የሆቴል ስራ እድሎች መገናኛ</p>
        <div class="cta">
            <a href="employee.html" class="btn btn-job">እኔ ስራ ፈላጊ ነኝ</a>
            <a href="employer.html" class="btn btn-emp">እኔ አሰሪ ነኝ</a>
        </div>
    </div>
</div>

</body>
</html>
