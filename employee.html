<div class="form-container">
    <h2>የስራ ፈላጊ ምዝገባ</h2>
    <form>
        <label>ሙሉ ስም</label>
        <input type="text" required>
        
        <label>የስራ መደብ (Position)</label>
        <select>
            <option>Front Office</option>
            <option>Housekeeping</option>
            <option>F&B Service</option>
            <option>Chef</option>
        </select>
        
        <label>የስራ ልምድ (በዓመት)</label>
        <input type="number">

        <label>CV ወይም የስራ ልምድ መግለጫ</label>
        <textarea rows="4" placeholder="ስለ ልምድዎ ዝርዝር መረጃ ይጻፉ"></textarea>
        
        <button type="submit">መረጃውን ይላኩ</button>
    </form>
</div>
